<!DOCTYPE html>
<html>
<head>
    <title>Sudoku Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
        }

        .levels {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .level-btn {
            padding: 20px 30px;
            font-size: 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            color: white;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .level-btn:hover {
            background: white;
            color: #667eea;
            transform: scale(1.05);
        }

        .score-box {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 12px;
            width: 70%;
            margin: auto;
            backdrop-filter: blur(10px);
        }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        .logout {
            margin-top: 30px;
            display: inline-block;
            color: white;
            text-decoration: none;
            border: 1px solid white;
            padding: 10px 20px;
            border-radius: 6px;
        }

        .logout:hover {
            background: white;
            color: #667eea;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Sudoku Dashboard</h1>

    <div class="levels">
        <button class="level-btn" onclick="startGame('easy')">Easy</button>
        <button class="level-btn" onclick="startGame('medium')">Medium</button>
        <button class="level-btn" onclick="startGame('hard')">Hard</button>
    </div>

    <div class="score-box">
        <h2>Your Scores</h2>

        <table>
            <tr>
                <th>Score</th>
                <th>Time (sec)</th>
            </tr>

            {% for s in scores %}
            <tr>
                <td>{{ s.score }}</td>
                <td>{{ s.time_taken }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <a class="logout" href="/logout/">Logout</a>

</div>

<script>
function startGame(level) {
    window.location.href = "/game/?level=" + level;
}
</script>


</body>
</html>
